name: Feature request
description: Suggest a new guard, integration, policy, or workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What agent safety problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should HoldTheGoblin do?
    validations:
      required: true
  - type: dropdown
    id: enforcement
    attributes:
      label: Enforcement type
      options:
        - Hard block
        - CI gate
        - Advisory agent guidance
        - Report-only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
