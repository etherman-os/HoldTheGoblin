name: Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate, for example v0.1.3."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Release tag $RELEASE_TAG is not a supported SemVer tag."
            exit 1
          fi
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          if [ "$(git cat-file -t "$RELEASE_TAG")" != "tag" ]; then
            echo "Release tag $RELEASE_TAG must be an annotated tag."
            exit 1
          fi
          git checkout --detach "$RELEASE_TAG"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x
          cache: npm

      - name: Verify release package version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version v$VERSION."
            exit 1
          fi

      - run: npm ci
      - run: npm run release:check

  publish:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Release tag $RELEASE_TAG is not a supported SemVer tag."
            exit 1
          fi
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          if [ "$(git cat-file -t "$RELEASE_TAG")" != "tag" ]; then
            echo "Release tag $RELEASE_TAG must be an annotated tag."
            exit 1
          fi
          git checkout --detach "$RELEASE_TAG"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify release package version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version v$VERSION."
            exit 1
          fi

      - run: npm ci --ignore-scripts
      - run: npm run build

      - name: Pack release artifact
        run: npm pack --json --ignore-scripts > pack.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          PACKAGE_FILE="$(node -e "const pack=require('./pack.json'); console.log(pack[0].filename)")"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$PACKAGE_FILE" --clobber
          else
            gh release create "$RELEASE_TAG" "$PACKAGE_FILE" --verify-tag --title "$RELEASE_TAG" --notes-from-tag
          fi
          echo "PACKAGE_FILE=$PACKAGE_FILE" >> "$GITHUB_ENV"

      - name: Check npm publish gate
        id: npm-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED }}
        run: |
          if [ "$NPM_PUBLISH_ENABLED" = "true" ] && [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packed artifact to npm
        if: steps.npm-publish.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "$PACKAGE_FILE" --provenance --access public --ignore-scripts

      - name: Skip npm publish
        if: steps.npm-publish.outputs.enabled != 'true'
        run: echo "NPM publish skipped. Set repository variable NPM_PUBLISH_ENABLED=true and secret NPM_TOKEN to enable it."
