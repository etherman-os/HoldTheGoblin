name: Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate, for example v0.1.3."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version v$VERSION."
            exit 1
          fi
          if [ "$(git cat-file -t "$RELEASE_TAG")" != "tag" ]; then
            echo "Release tag $RELEASE_TAG must be an annotated tag."
            exit 1
          fi

      - run: npm run release:check

      - name: Pack release artifact
        run: npm pack --json > pack.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          PACKAGE_FILE="$(node -e "const pack=require('./pack.json'); console.log(pack[0].filename)")"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$PACKAGE_FILE" --clobber
          else
            gh release create "$RELEASE_TAG" "$PACKAGE_FILE" --verify-tag --title "$RELEASE_TAG" --notes-from-tag
          fi

      - name: Check npm publish gate
        id: npm-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED }}
        run: |
          if [ "$NPM_PUBLISH_ENABLED" = "true" ] && [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-publish.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Skip npm publish
        if: steps.npm-publish.outputs.enabled != 'true'
        run: echo "NPM publish skipped. Set repository variable NPM_PUBLISH_ENABLED=true and secret NPM_TOKEN to enable it."
