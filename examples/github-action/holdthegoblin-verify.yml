name: HoldTheGoblin

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Validate HoldTheGoblin config
        run: npm exec --yes --package=holdthegoblin@latest -- holdthegoblin config validate --format json

      - name: Verify with HoldTheGoblin
        run: npm exec --yes --package=holdthegoblin@latest -- holdthegoblin verify --format markdown --github-step-summary

      - name: Upload HoldTheGoblin evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: holdthegoblin-evidence
          if-no-files-found: ignore
          path: |
            .holdthegoblin/latest.md
            .holdthegoblin/latest.html
            .holdthegoblin/runs/*.json
            .holdthegoblin/runs/*.md
            .holdthegoblin/runs/*.html
